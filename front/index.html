<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Cadastro de Usuarios</title>
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="menu-btn" onclick="toggleMenu()"><img src="img/menu.png" width="16" height="16" fill="#fff" alt=""></i><span>Menu</span></div>

    <nav>
      <div class="btn"><span><img src="img/home.png" width="16" height="16" fill="#fff" alt=""></span> <p>Home</p></div>
      <div class="btn"><span><img src="img/add.png" width="16" height="16" fill="#fff" alt=""></span> <p>Cadastrar</p></div>
      <div class="btn"><span><img src="img/list.png" width="23" height="23" fill="#fff" alt=""></span> <p>Cadastros</p></div>
    </nav>
  </aside>

  <!-- Conteúdo -->
  <main class="content">

    <div class="breadcrumb">
      🏠 Home > Cadastros > <span> </span><a href="/index.html" target="_blank">Cadastro de Usuarios</a></span>
    </div>

    
    <div class="card">
      <h2>Cadastro de Usuarios</h3>

      <form id="formCadastro">

        <div class="grid-2">
          <div class="form-group">
            <label>Nome </label>
            <input type="text" id="nome">
          </div>

          <div class="form-group">
            <label>Sobrenome</label>
            <input type="text" id="sobrenome">
          </div>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label>Nascimento </label>
            <input type="date" id="nascimento">
          </div>

          <div class="form-group">
            <label>Sexo </label>
            <select id="sexo">
              <option>Selecione</option>
              <option>Masculino</option>
              <option>Feminino</option>
              <option>Outro</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Endereço</label>
          <input type="text" id="endereco">
        </div>

        <div class="grid-3">
          <div class="form-group">
            <label>Telefone</label>
            <input type="text" id="numero" placeholder="(00) 0000-0000">
          </div>

          <div class="form-group">
            <label>Bairro </label>
            <input type="text" id="bairro">
          </div>

          <div class="form-group">
            <label>UF</label>
            <select id="UF">
              <option value="">Selecione</option>
              <option value="AC">AC</option>
              <option value="AL">AL</option>
              <option value="AP">AP</option>
              <option value="AM">AM</option>
              <option value="BA">BA</option>
              <option value="CE">CE</option>
              <option value="DF">DF</option>
              <option value="ES">ES</option>
              <option value="GO">GO</option>
              <option value="MA">MA</option>
              <option value="MT">MT</option>
              <option value="MS">MS</option>
              <option value="MG">MG</option>
              <option value="PA">PA</option>
              <option value="PB">PB</option>
              <option value="PR">PR</option>
              <option value="PE">PE</option>
              <option value="PI">PI</option>
              <option value="RJ">RJ</option>
              <option value="RN">RN</option>
              <option value="RS">RS</option>
              <option value="RO">RO</option>
              <option value="RR">RR</option>
              <option value="SC">SC</option>
              <option value="SP">SP</option>
              <option value="SE">SE</option>
              <option value="TO">TO</option>
            </select>
          </div>
        </div>

        <div class="grid-3">
          <div class="form-group">
            <label>Cidade</label>
            <input type="text" id="cidade">
          </div>

          <div class="form-group">
            <label>CEP</label>
            <input type="text" id="cep" maxlength="10" placeholder="00000-000">
          </div>

          <div class="form-group">
            <label>CPF</label>
            <input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00">
          </div>
        </div>


        <div class="actions">
          <button type="submit" class="btn save">Salvar</button>
          <button class="btn cancel" onclick="limparFormulario()">Cancelar</button>
        </div>

      </form>
    </div>

  </main>
  <br><button onclick="toggleDarkMode()" class="btn-noturno">🌙</button>
  
</div>

<script src="js/script.js"></SCript>
</body>
</html>
