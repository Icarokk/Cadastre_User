version: '3.8'

services:
  backend:
    build: ./back
    ports:
      - "3000:3000"
    volumes:
      - ./back:/app
    command: npm run dev

  mysql:
    image: mysql:8.0
    container_name: mysql_cadastro
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: Cadastro_usuarios
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: .
    container_name: api_node
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: Cadastro_usuarios
    command: ["node", "server.js"]

volumes:
  mysql_data: