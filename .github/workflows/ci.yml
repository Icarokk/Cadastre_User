name: 🚀 CI/CD DevOps Project

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 📥 Clonar repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # 🟢 Configurar Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 📦 Instalar dependências BACKEND
      - name: Instalar dependências (back)
        working-directory: back
        run: npm install

      # ▶️ Rodar servidor em background
      - name: Iniciar aplicação
        working-directory: back
        run: |
          nohup node src/app.js > server.log 2>&1 &
          sleep 5

      # 🔍 Ver logs (DEBUG - opcional)
      - name: Ver logs do servidor
        working-directory: back
        run: cat server.log

      # 🌐 Testar API
      - name: Testar rota principal
        run: curl --fail http://localhost:3000